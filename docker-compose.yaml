services:
  # ============================ MySQL 生产级配置 ============================
  local_mysql:
    container_name: local_mysql
    image: mysql:8.0.40
    restart: always
    hostname: mysql-host
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-123456}"
      MYSQL_ROOT_HOST: "%"
      LANG: C.UTF-8
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/etc/my.cnf:/etc/mysql/my.cnf
      - ./mysql/logs:/var/log/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
      - ./mysql/backup:/backup
    ports:
      - "3306:3306"
    networks:
      - base-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # 优雅关闭：给 MySQL 60 秒时间完成事务和刷盘
    stop_grace_period: 60s
    stop_signal: SIGTERM

  # ============================ Redis 生产级配置 ============================
  local_redis:
    image: redis:7.2.7
    container_name: local_redis
    restart: always
    hostname: redis-host
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --appendonly yes
      --appendfsync everysec
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
      - ./redis/etc/redis.conf:/usr/local/etc/redis/redis.conf
      - ./redis/logs:/var/log/redis
      - ./redis/backup:/backup
    networks:
      - base-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G
        reservations:
          cpus: '0.25'
          memory: 256M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # 优雅关闭：Redis 会执行 RDB 持久化
    stop_grace_period: 30s
    stop_signal: SIGTERM

  # ============================ RabbitMQ 生产级配置 ============================
  local_rabbitmq:
    image: rabbitmq:4.2.5-management
    container_name: local_rabbitmq
    restart: always
    hostname: rabbitmq-node-1
    environment:
      - TZ=Asia/Shanghai
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-root}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-123456}
      - RABBITMQ_DEFAULT_VHOST=/dev
      - RABBITMQ_LOOPBACK_USERS=guest
      # 启用高可用队列
      - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbitmq_management load_definitions "/etc/rabbitmq/definitions.json"
    ports:
      - "5672:5672"   # AMQP 端口
      - "15672:15672" # 管理界面
      - "15692:15692" # Prometheus 监控
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq
      - ./rabbitmq/logs:/var/log/rabbitmq
      - ./rabbitmq/conf/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./rabbitmq/conf/definitions.json:/etc/rabbitmq/definitions.json
      - ./rabbitmq/backup:/backup
    networks:
      - base-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    sysctls:
      - net.core.somaxconn=65536
      - net.ipv4.tcp_max_syn_backlog=65536
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # 优雅关闭：给 RabbitMQ 60 秒时间完成消息处理
    stop_grace_period: 60s
    stop_signal: SIGTERM

  # ============================ MinIO 对象存储 ============================
  local_minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: local_minio
    restart: always
    hostname: minio-host
    environment:
      - TZ=Asia/Shanghai
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin2024!}
      # 启用纠删码，提供数据冗余
#      - MINIO_STORAGE_CLASS_STANDARD=EC:2
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # API 端口
      - "9001:9001"  # Web 控制台端口
    volumes:
      - ./minio/data:/data
      - ./minio/logs:/logs
      - ./minio/config:/root/.minio
      - ./minio/backup:/backup
    networks:
      - base-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # 优雅关闭
    stop_grace_period: 30s
    stop_signal: SIGTERM

# ============================ 网络配置 ============================
networks:
  base-network:
    driver: bridge
    # 配置网络以防止 IP 变化导致的问题
    ipam:
      config:
        - subnet: 172.30.0.0/16
