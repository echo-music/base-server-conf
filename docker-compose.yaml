
services:
  # ============================ MySQL 生产级配置 ============================
  local_mysql:
    container_name: local_mysql
    image: mysql:8.0.40
    restart: always
    hostname: mysql-host
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: "Mysql@Secure2024!"  # 强密码建议
      MYSQL_ROOT_HOST: "%"
      LANG: C.UTF-8
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/etc/my.cnf:/etc/mysql/my.cnf
      - ./mysql/logs:/var/log/mysql
    ports:
      - "3306:3306"
    networks:
      - base-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
  # ============================ Redis 生产级配置 ============================
  local_redis:
    image: redis:7.2.7
    container_name: local_redis
    restart: always
    hostname: redis-host
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --appendonly yes
      --appendfsync everysec
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
      - ./redis/etc/redis.conf:/usr/local/etc/redis/redis.conf
      - ./redis/logs:/var/log/redis
    networks:
      - base-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G
        reservations:
          cpus: '0.25'
          memory: 256M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
