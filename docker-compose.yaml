  # ============================ RabbitMQ 生产级配置 ============================
  local_rabbitmq:
    image: rabbitmq:4.2.5-management
    container_name: local_rabbitmq
    restart: always
    hostname: rabbitmq-node-1
    environment:
      - TZ=Asia/Shanghai
      - RABBITMQ_DEFAULT_USER=rabbitmq_admin  # 修改默认用户名
      - RABBITMQ_DEFAULT_PASS=Rabbitmq@Secure2024!  # 强密码
      - RABBITMQ_DEFAULT_VHOST=/production  # 生产虚拟主机
      - RABBITMQ_LOOPBACK_USERS=guest  # 只允许 guest 本地连接
    ports:
      - "5672:5672"   # AMQP 端口
      - "15672:15672" # 管理界面
      - "15692:15692" # Prometheus 监控
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq
      - ./rabbitmq/logs:/var/log/rabbitmq
      - ./rabbitmq/conf/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    networks:
      - base-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    sysctls:
      - net.core.somaxconn=65536
      - net.ipv4.tcp_max_syn_backlog=65536
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

# ============================ 网络配置 ============================
networks:
  base-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
          gateway: 172.22.0.1
